name: BoomHud CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.gitversion.outputs.semVer }}
      fullSemVer: ${{ steps.gitversion.outputs.fullSemVer }}
      nuGetVersion: ${{ steps.gitversion.outputs.nuGetVersionV2 }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3.2.0
        with:
          versionSpec: '5.x'
      
      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3.2.0
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml
      
      - name: Restore dependencies
        working-directory: dotnet
        run: dotnet restore
      
      - name: Build
        working-directory: dotnet
        run: dotnet build --no-restore --configuration Release -p:Version=${{ steps.gitversion.outputs.fullSemVer }}
      
      - name: Test
        working-directory: dotnet
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Verify package graph
        run: pwsh -NoProfile -File .\scripts\verify-package-graph.ps1

      - name: Verify test graph
        run: pwsh -NoProfile -File .\scripts\verify-test-graph.ps1

      - name: Display Version
        run: |
          echo "Version: ${{ steps.gitversion.outputs.semVer }}"
          echo "FullSemVer: ${{ steps.gitversion.outputs.fullSemVer }}"
          echo "NuGetVersion: ${{ steps.gitversion.outputs.nuGetVersionV2 }}"

  generate:
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3.2.0
        with:
          versionSpec: '5.x'
      
      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3.2.0
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml
      
      - name: Restore dependencies
        working-directory: dotnet
        run: dotnet restore
      
      - name: Build CLI
        working-directory: dotnet
        run: dotnet build src/BoomHud.Cli/BoomHud.Cli.csproj --configuration Release -p:Version=${{ steps.gitversion.outputs.fullSemVer }}
      
      - name: Generate Godot
        working-directory: dotnet
        run: |
          dotnet run --project src/BoomHud.Cli/BoomHud.Cli.csproj --configuration Release -- \
            generate --manifest ../ui/boom-hud.compose.json --target godot --output ../artifacts/godot
      
      - name: Generate Terminal.Gui
        working-directory: dotnet
        run: |
          dotnet run --project src/BoomHud.Cli/BoomHud.Cli.csproj --configuration Release -- \
            generate --manifest ../ui/boom-hud.compose.json --target terminalgui --output ../artifacts/terminalgui
      
      - name: Generate Avalonia
        working-directory: dotnet
        run: |
          dotnet run --project src/BoomHud.Cli/BoomHud.Cli.csproj --configuration Release -- \
            generate --manifest ../ui/boom-hud.compose.json --target avalonia --output ../artifacts/avalonia

      - name: Generate snapshots (dry-run)
        working-directory: dotnet
        run: |
          dotnet run --project src/BoomHud.Cli/BoomHud.Cli.csproj --configuration Release -- \
            snapshot --manifest ../ui/boom-hud.compose.json --dry-run --verbose

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: remotion/package-lock.json

      - name: Install Remotion dependencies
        working-directory: remotion
        run: npm ci || npm install

      - name: Generate preview video
        working-directory: dotnet
        run: |
          dotnet run --project src/BoomHud.Cli/BoomHud.Cli.csproj --configuration Release -- \
            video --snapshots ../ui/snapshots --verbose

      # Download baseline from main branch (if exists)
      - name: Download baseline snapshots
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci.yml
          branch: main
          name: snapshots
          path: ui/snapshots-baseline
          if_no_artifact_found: warn
        continue-on-error: true

      # Run baseline comparison (hash-level with quantitative metrics)
      - name: Run baseline comparison
        if: github.event_name == 'pull_request'
        working-directory: dotnet
        run: |
          dotnet run --project src/BoomHud.Cli/BoomHud.Cli.csproj --configuration Release -- \
            baseline compare \
            --current ../ui/snapshots \
            --baseline ../ui/snapshots-baseline \
            --out ../ui/baseline-report.json \
            --summary \
            --gh-actions \
            --tolerance 8 \
            --min-changed-percent 0.01

      # Generate diff images for changed frames
      - name: Generate diff images
        if: github.event_name == 'pull_request'
        working-directory: dotnet
        run: |
          if [ -d "../ui/snapshots-baseline" ] && [ -f "../ui/snapshots-baseline/snapshots.manifest.json" ]; then
            echo "Generating diff images..."
            dotnet run --project src/BoomHud.Cli/BoomHud.Cli.csproj --configuration Release -- \
              baseline diff \
              --current ../ui/snapshots \
              --baseline ../ui/snapshots-baseline \
              --out ../ui/diffs \
              --tolerance 8 \
              --verbose
          else
            echo "No baseline found, skipping diff generation"
          fi

      # Generate comparison video if baseline exists
      - name: Generate comparison video
        if: github.event_name == 'pull_request'
        working-directory: dotnet
        run: |
          if [ -d "../ui/snapshots-baseline" ] && [ -f "../ui/snapshots-baseline/snapshots.manifest.json" ]; then
            echo "Baseline found, generating comparison video..."
            dotnet run --project src/BoomHud.Cli/BoomHud.Cli.csproj --configuration Release -- \
              video --snapshots ../ui/snapshots --baseline ../ui/snapshots-baseline --verbose
          else
            echo "No baseline found, skipping comparison video"
          fi
      
      - name: Upload generated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-code
          path: artifacts/
          retention-days: 7

      - name: Upload snapshots
        uses: actions/upload-artifact@v4
        with:
          name: snapshots
          path: ui/snapshots/
          retention-days: 7

      - name: Upload preview video
        uses: actions/upload-artifact@v4
        with:
          name: preview-video
          path: ui/snapshots/preview.mp4
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload comparison video
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: compare-video
          path: ui/snapshots/compare.mp4
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload baseline report
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: baseline-report
          path: ui/baseline-report.json
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload diff images
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: diff-images
          path: ui/diffs/
          retention-days: 7
          if-no-files-found: ignore

      - name: Generate Changelog
        if: github.ref == 'refs/heads/main'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md

      - name: Upload Changelog
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: CHANGELOG.md
          retention-days: 7
