version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  agent:sync:
    desc: Sync all tool-specific directories from .agent
    cmds:
      - task: agent:sync-skills
      - task: agent:sync-rules
      - task: agent:sync-workflows
      - task: agent:sync-commands
      - task: agent:sync-opencode

  agent:sync-skills:
    desc: Sync skill stubs/copies from .agent/skills to tool-specific directories
    cmds:
      - python scripts/sync_skills.py

  agent:sync-rules:
    desc: Sync rules from .agent/rules to tool-specific directories
    cmds:
      - python scripts/sync_rules.py

  agent:sync-workflows:
    desc: Sync workflows from .agent/workflows to tool-specific directories
    cmds:
      - python scripts/sync_workflows.py

  agent:sync-commands:
    desc: Sync commands from .agent/commands to tool-specific directories
    cmds:
      - python scripts/sync_commands.py

  agent:sync-opencode:
    desc: Generate opencode.json from .agent/adapters/opencode/permissions.yaml
    cmds:
      - python scripts/sync_opencode.py

  # ============================================================================
  # DTO Generation (schema → quicktype → *.g.cs)
  # ============================================================================

  generate:dto:
    desc: Regenerate all DTOs from JSON schemas using quicktype
    deps:
      - generate:dto:compose
      - generate:dto:motion
      - generate:dto:states
      - generate:dto:tokens

  generate:dto:compose:
    desc: Generate ComposeManifestDto from compose.schema.json
    cmds:
      - >-
        npx quicktype@23.0.170
        --src schemas/json/compose.schema.json
        --src-lang schema
        --lang csharp
        --namespace BoomHud.Abstractions.Composition.Generated
        --features complete
        --array-type list
        --any-type object
        --no-combine-classes
        --out dotnet/src/BoomHud.Abstractions/Composition/Generated/ComposeManifestDto.g.cs
    sources:
      - schemas/json/compose.schema.json
    generates:
      - dotnet/src/BoomHud.Abstractions/Composition/Generated/ComposeManifestDto.g.cs

  generate:dto:motion:
    desc: Generate MotionDocumentDto from motion.schema.json
    cmds:
      - >-
        npx quicktype@23.0.170
        --src schemas/json/motion.schema.json
        --src-lang schema
        --lang csharp
        --framework SystemTextJson
        --top-level MotionDocumentDto
        --namespace BoomHud.Abstractions.Motion.Generated
        --features complete
        --array-type list
        --any-type object
        --no-combine-classes
        --out dotnet/src/BoomHud.Abstractions/Motion/Generated/MotionDocumentDto.g.cs
    sources:
      - schemas/json/motion.schema.json
    generates:
      - dotnet/src/BoomHud.Abstractions/Motion/Generated/MotionDocumentDto.g.cs

  generate:dto:states:
    desc: Generate StatesManifestDto from states.schema.json
    cmds:
      - >-
        npx quicktype@23.0.170
        --src schemas/json/states.schema.json
        --src-lang schema
        --lang csharp
        --namespace BoomHud.Abstractions.Snapshots.Generated
        --features complete
        --array-type list
        --any-type object
        --no-combine-classes
        --out dotnet/src/BoomHud.Abstractions/Snapshots/Generated/StatesManifestDto.g.cs
    sources:
      - schemas/json/states.schema.json
    generates:
      - dotnet/src/BoomHud.Abstractions/Snapshots/Generated/StatesManifestDto.g.cs

  generate:dto:tokens:
    desc: Generate TokensDto from tokens.schema.json
    cmds:
      - >-
        npx quicktype@23.0.170
        --src schemas/json/tokens.schema.json
        --src-lang schema
        --lang csharp
        --namespace BoomHud.Abstractions.Tokens.Generated
        --features complete
        --array-type list
        --any-type object
        --no-combine-classes
        --out dotnet/src/BoomHud.Abstractions/Tokens/Generated/TokensDto.g.cs
    sources:
      - schemas/json/tokens.schema.json
    generates:
      - dotnet/src/BoomHud.Abstractions/Tokens/Generated/TokensDto.g.cs

  # ============================================================================
  # CI Verification
  # ============================================================================

  verify:no-dto-leak:
    desc: Verify CLI does not reference Generated namespaces
    cmds:
      - pwsh -NoProfile -File scripts/verify-no-dto-leak.ps1

  verify:package-graph:
    desc: Verify split-ready package IDs and NuGet dependency graph
    cmds:
      - pwsh -NoProfile -File scripts/verify-package-graph.ps1

  verify:test-graph:
    desc: Verify Foundation/backend test ownership and project references
    cmds:
      - pwsh -NoProfile -File scripts/verify-test-graph.ps1

  verify:fidelity:first-pass:
    desc: Run the first-pass Pen → Remotion → Unity fidelity workflow
    cmds:
      - pwsh -NoProfile -File scripts/run-pen-remotion-unity-fidelity.ps1

  verify:fidelity:corpus:
    desc: Run the component fidelity corpus and enforce the current quality floor
    cmds:
      - pwsh -NoProfile -File scripts/run-fidelity-corpus.ps1
